// MMI3GCipher — XOR PRNG matching Harman Becker proc_scriptlauncher
// Verified byte-identical to builder/encoder.py
class MMI3GCipher {
  constructor() {
    this.SEED_INIT = 0x001be3ac >>> 0;
    this.seed = this.SEED_INIT;
  }
  _prng_rand() {
    const r0 = this.seed >>> 0;
    let r1 = ((this.seed >>> 1) | ((this.seed << 31) >>> 0)) >>> 0;
    let r3 = ((((r1 >>> 16) & 0xFF) + r1) >>> 0);
    r1 = ((((r3 >>> 8) & 0xFF) << 16) >>> 0);
    r3 = ((r3 - r1) >>> 0);
    this.seed = r3;
    return r0;
  }
  process(data) {
    this.seed = this.SEED_INIT;
    this._prng_rand();
    const out = new Uint8Array(data.length);
    for (let i = 0; i < data.length; i++) {
      out[i] = data[i] ^ (this._prng_rand() & 0xFF);
    }
    return out;
  }
}

async function fetchBinary(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${url}`);
  return new Uint8Array(await r.arrayBuffer());
}
async function fetchText(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${url}`);
  return await r.text();
}
async function fetchJson(url) {
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}: ${url}`);
  return await r.json();
}

/**
 * Generate the combined run.sh installer from selected modules.
 * Mirrors generate_run_sh() in builder/build_sd.py.
 */
function generateRunSh(selected, manifest, overrides) {
  overrides = overrides || {};
  const needsFlashInstall = selected.some((modName) => {
    const meta = manifest.modules[modName];
    return meta && meta.installs_to_flash !== false;
  });
  const lines = [
    "#!/bin/ksh",
    "# ============================================================",
    "# MMI3G-Toolkit - Combined Installer",
    "# Auto-generated by the web SD card builder",
    "# ============================================================",
    "",
    "SDPATH=\"${1:-$(dirname $0)}\"",
    "export SDPATH",
    "",
    "# Source platform.sh for QNX compatibility shims (head, basename,",
    "# wc, printf, awk, sync, mkdir -p all shimmed for QNX)",
    "if [ -f \"${SDPATH}/scripts/common/platform.sh\" ]; then",
    "    . \"${SDPATH}/scripts/common/platform.sh\"",
    "fi",
    "",
    "# Show \"running\" status on MMI display",
    "if [ -f \"${SDPATH}/bin/showScreen\" ] && [ -f \"${SDPATH}/lib/running.png\" ]; then",
    "    cp \"${SDPATH}/bin/showScreen\" /tmp/showScreen 2>/dev/null",
    "    chmod +x /tmp/showScreen 2>/dev/null",
    "    /tmp/showScreen \"${SDPATH}/lib/running.png\" &",
    "    SHOWSCREEN_PID=$!",
    "fi",
    "",
    "LOGFILE=\"${SDPATH}/var/install-$(date +%Y%m%d-%H%M%S).log\"",
    "EFSDIR=\"/mnt/efs-system\"",
    "ENGDEFS=\"${EFSDIR}/engdefs\"",
    "",
    "exec > ${LOGFILE} 2>&1",
    "",
    "echo \"============================================\"",
    "echo \" MMI3G-Toolkit Installer\"",
    "echo \" $(date)\"",
    "echo \" Train: $(cat /dev/shmem/sw_trainname.txt 2>/dev/null)\"",
    "echo \"============================================\"",
    "echo \"\"",
    "",
  ];

  if (needsFlashInstall) {
    lines.push(
      "# Safety checks",
      "if [ ! -d \"${EFSDIR}\" ]; then",
      "    echo \"[ERROR] /mnt/efs-system not found!\"",
      "    exit 1",
      "fi",
      "",
      "# Create engdefs if needed (gem-activator will populate it)",
      "mkdir -p \"${ENGDEFS}\" 2>/dev/null",
      "",
      "# Remount read-write",
      "mount -uw ${EFSDIR} 2>/dev/null",
      "if [ $? -ne 0 ]; then",
      "    echo \"[ERROR] Failed to remount efs-system\"",
      "    exit 1",
      "fi",
      "echo \"[OK] efs-system remounted rw\"",
      "echo \"\"",
      "",
      "# Install shared platform.sh helper (sourced by module scripts)",
      "if [ -f \"${SDPATH}/scripts/common/platform.sh\" ]; then",
      "    mkdir -p \"${EFSDIR}/scripts/common\"",
      "    cp -v \"${SDPATH}/scripts/common/platform.sh\" \"${EFSDIR}/scripts/common/platform.sh\"",
      "    chmod 0644 \"${EFSDIR}/scripts/common/platform.sh\"",
      "    echo \"[OK] platform.sh installed to ${EFSDIR}/scripts/common/\"",
      "fi",
      "echo \"\"",
      "",
    );
  } else {
    lines.push(
      "# Selected modules are SD-only; do not remount or write efs-system.",
      "echo \"[INFO] SD-only module set; efs-system will not be remounted\"",
      "echo \"\"",
      "",
    );
  }

  for (const modName of selected) {
    const meta = manifest.modules[modName];
    if (!meta) continue;
    const installsToFlash = meta.installs_to_flash !== false;
    const scriptDir = meta.script_dir || `/scripts/${modName}`;
    const esdFiles = (meta.files || [])
      .filter(f => f.path.startsWith("engdefs/") && f.path.endsWith(".esd"))
      .sort((a, b) => (a.path < b.path ? -1 : a.path > b.path ? 1 : 0));
    const shFiles = (meta.files || [])
      .filter(f => f.path.startsWith("scripts/") && f.path.endsWith(".sh"))
      .sort((a, b) => (a.path < b.path ? -1 : a.path > b.path ? 1 : 0));

    lines.push(`# --- Module: ${modName} ---`);
    lines.push(`echo "[MODULE] Installing ${modName}..."`);
    if (installsToFlash) {
      // Re-mount EFS rw (standalone modules may trigger F3S reclaim)
      lines.push('mount -uw ${EFSDIR} 2>/dev/null');
    } else {
      lines.push("# SD-only module: run from card and skip flash install");
    }
    if (meta.standalone && meta.run_script) {
      const runScript = overrides[modName] || meta.run_script;
      lines.push(`if [ -f "\${SDPATH}/scripts/${runScript}" ]; then`);
      lines.push(`    ksh "\${SDPATH}/scripts/${runScript}" "\${SDPATH}"`);
      lines.push(`    echo "[OK] ${modName} standalone script executed"`);
      lines.push("else");
      lines.push(`    echo "[WARN] ${runScript} not found for ${modName}"`);
      lines.push("fi");

      if (installsToFlash && shFiles.length > 0) {
        lines.push(`SCRIPTDIR="\${EFSDIR}${scriptDir}"`);
        lines.push("mkdir -p ${SCRIPTDIR}");
        for (const f of shFiles) {
          const name = f.path.split("/").pop();
          lines.push(`if [ -f "\${SDPATH}/scripts/${name}" ]; then`);
          lines.push(`    cp -v "\${SDPATH}/scripts/${name}" "\${SCRIPTDIR}/${name}"`);
          lines.push(`    chmod +x "\${SCRIPTDIR}/${name}"`);
          lines.push("fi");
        }
      }
    } else if (installsToFlash) {
      lines.push(`if [ -d "\${SDPATH}/engdefs" ]; then`);
      for (const f of esdFiles) {
        const name = f.path.split("/").pop();
        lines.push(`    if [ -f "\${SDPATH}/engdefs/${name}" ]; then`);
        lines.push(`        cp -v "\${SDPATH}/engdefs/${name}" "\${ENGDEFS}/${name}"`);
        lines.push(`        echo "[INST] ${name}"`);
        lines.push(`    fi`);
      }
      lines.push(`fi`);
      if (shFiles.length > 0) {
        lines.push(`SCRIPTDIR="\${EFSDIR}${scriptDir}"`);
        lines.push(`mkdir -p \${SCRIPTDIR}`);
        lines.push(`if [ -d "\${SDPATH}/scripts" ]; then`);
        for (const f of shFiles) {
          const name = f.path.split("/").pop();
          lines.push(`    if [ -f "\${SDPATH}/scripts/${name}" ]; then`);
          lines.push(`        cp -v "\${SDPATH}/scripts/${name}" "\${SCRIPTDIR}/${name}"`);
          lines.push(`        chmod +x "\${SCRIPTDIR}/${name}"`);
          lines.push(`        echo "[INST] ${name}"`);
          lines.push(`    fi`);
        }
        lines.push(`fi`);
      }
    } else {
      lines.push(`echo "[INFO] ${modName} is SD-only; no flash files installed"`);
    }

    lines.push(`echo "[OK] ${modName} installed"`);
    lines.push(`echo ""`);
    lines.push("");
  }

  lines.push("# --- Complete ---");
  lines.push("echo \"============================================\"");
  lines.push("echo \" Installation Complete\"");
  lines.push(`echo " Modules installed: ${selected.length}"`);
  lines.push("echo \" Log: ${LOGFILE}\"");
  lines.push("echo \"\"");
  lines.push("echo \" Open GEM (CAR + BACK) to access new screens\"");
  lines.push("echo \"============================================\"");
  lines.push("");
  lines.push("# Show \"done\" status on MMI display");
  lines.push("if [ -x /tmp/showScreen ] && [ -f \"${SDPATH}/lib/done.png\" ]; then");
  lines.push("    kill ${SHOWSCREEN_PID} 2>/dev/null");
  lines.push("    sleep 1");
  lines.push("    /tmp/showScreen \"${SDPATH}/lib/done.png\" &");
  lines.push("fi");

  return lines.join("\n") + "\n";
}

/**
 * Fetch every file required by the selected modules plus core files.
 * Returns an array of { path, bytes } ready to be written either to a
 * directory picker or to a ZIP.
 */
async function buildSdBundle(selected, onProgress, overrides) {
  overrides = overrides || {};
  onProgress && onProgress("Loading manifest...", 0);
  const manifest = await fetchJson(MANIFEST_URL);
  const rawBase = manifest.raw_url_base;
  const moduleOutputPath = (modName, meta, f) => {
    if (f.path === "module.json") return null;
    if (f.path.startsWith("engdefs/") || f.path.startsWith("scripts/")) return f.path;
    if (meta.artifact && f.path === meta.artifact) return `modules/${modName}/${f.path}`;
    for (const payload of (meta.payload_dirs || [])) {
      const source = String(payload.source || "").replace(/\/+$/, "");
      const target = String(payload.target || source).replace(/\/+$/, "");
      if (source && target && f.path.startsWith(`${source}/`)) {
        return `${target}/${f.path.slice(source.length + 1)}`;
      }
    }
    return null;
  };

  // Count total fetches for progress
  let totalFiles = 2; // copie_scr_plain.sh + uninstall.sh
  if (manifest.core_files.platform_sh) totalFiles += 1;
  if (manifest.core_files.showScreen) totalFiles += 1;
  for (const pngKey of ["lib_running_png", "lib_done_png"]) {
    if (manifest.core_files[pngKey]) totalFiles += 1;
  }
  if (selected.includes("gem-activator")) {
    for (const pngKey of ["lib_gem_enabled_png", "lib_gem_disabled_png"]) {
      if (manifest.core_files[pngKey]) totalFiles += 1;
    }
  }
  for (const mod of selected) {
    const meta = manifest.modules[mod];
    if (!meta) continue;
    totalFiles += (meta.files || []).filter((f) => moduleOutputPath(mod, meta, f)).length;
  }
  let done = 0;
  const step = (label) => {
    done += 1;
    onProgress && onProgress(label, Math.min(99, Math.round(done * 95 / totalFiles)));
  };

  // --- Core files ---
  onProgress && onProgress("Fetching copie_scr.sh template...", 2);
  const plainCopie = await fetchBinary(rawBase + manifest.core_files.copie_scr_plain_sh);
  step("Encoding copie_scr.sh");
  const encodedCopie = new MMI3GCipher().process(plainCopie);

  const uninstallSh = await fetchBinary(rawBase + manifest.core_files.uninstall_sh);
  step("Fetched uninstall.sh");

  let platformSh = null;
  if (manifest.core_files.platform_sh) {
    try {
      platformSh = await fetchBinary(rawBase + manifest.core_files.platform_sh);
      step("Fetched platform.sh");
    } catch (e) {
      console.warn("platform.sh not available:", e);
    }
  }

  // Fetch showScreen binary (proven SH4 QNX tool for displaying PNGs on MMI)
  let showScreenBin = null;
  if (manifest.core_files.showScreen) {
    try {
      showScreenBin = await fetchBinary(rawBase + manifest.core_files.showScreen);
      step("Fetched showScreen");
    } catch (e) {
      console.warn("showScreen not available:", e);
    }
  }

  // --- Module files (parallel fetches per module) ---
  const files = [];
  files.push({ path: "copie_scr.sh", bytes: encodedCopie });
  files.push({ path: "uninstall.sh", bytes: uninstallSh });
  if (platformSh) {
    files.push({ path: "scripts/common/platform.sh", bytes: platformSh });
  }

  for (const modName of selected) {
    const meta = manifest.modules[modName];
    if (!meta) continue;
    const bundleFiles = (meta.files || []).filter((f) => moduleOutputPath(modName, meta, f));
    const tasks = bundleFiles.map(async (f) => {
      const url = rawBase + `modules/${modName}/${f.path}`;
      const bytes = await fetchBinary(url);
      step(`Fetched ${modName}/${f.path}`);
      return { path: moduleOutputPath(modName, meta, f), bytes };
    });
    const results = await Promise.all(tasks);
    for (const r of results) if (r) files.push(r);
  }

  // --- Generated run.sh ---
  onProgress && onProgress("Generating run.sh...", 97);
  const runSh = generateRunSh(selected, manifest, overrides);
  files.push({ path: "run.sh", bytes: new TextEncoder().encode(runSh) });

  // --- Placeholder dirs so bin/ lib/ var/ exist even if empty ---
  if (showScreenBin) {
    files.push({ path: "bin/showScreen", bytes: showScreenBin });
  }
  // Always include universal status PNGs
  for (const pngKey of ['lib_running_png', 'lib_done_png']) {
    if (manifest.core_files[pngKey]) {
      try {
        const png = await fetchBinary(rawBase + manifest.core_files[pngKey]);
        const fname = pngKey.replace('lib_', '').replace('_png', '.png');
        files.push({ path: `lib/${fname}`, bytes: png });
        step(`Fetched ${fname}`);
      } catch (e) { console.warn(`${pngKey} not available:`, e); }
    }
  }
  // Module-specific PNGs — only when that module is selected
  if (selected.includes("gem-activator")) {
    for (const pngKey of ['lib_gem_enabled_png', 'lib_gem_disabled_png']) {
      if (manifest.core_files[pngKey]) {
        try {
          const png = await fetchBinary(rawBase + manifest.core_files[pngKey]);
          const fname = pngKey.replace('lib_', '').replace('_png', '.png');
          files.push({ path: `lib/${fname}`, bytes: png });
          step(`Fetched ${fname}`);
        } catch (e) { console.warn(`${pngKey} not available:`, e); }
      }
    }
  }
  files.push({ path: "bin/.keep", bytes: new Uint8Array(0) });
  files.push({ path: "lib/.keep", bytes: new Uint8Array(0) });
  files.push({ path: "var/.keep", bytes: new Uint8Array(0) });

  // --- GEMMI binaries (only when google-earth module is selected) ---
  // P0824 deploy already bundles a /gemmi payload, so avoid overwriting it.
  if (selected.includes("google-earth") && !selected.includes("google-earth-p0824-deploy") && manifest.gemmi_assets) {
    const ga = manifest.gemmi_assets;
    onProgress && onProgress("Fetching GEMMI binaries (~22MB)...", 96);
    for (const asset of ga.files) {
      try {
        const url = ga.base_url + asset.name;
        const bytes = await fetchBinary(url);
        files.push({ path: asset.path, bytes });
        step(`Fetched ${asset.name} (${(bytes.length / 1024 / 1024).toFixed(1)}MB)`);
      } catch (e) {
        console.warn(`GEMMI asset ${asset.name} not available:`, e);
        // Don't fail the build — ge_deploy.sh handles missing files gracefully
      }
    }
  }

  onProgress && onProgress("Bundle ready", 100);
  return { files, manifest };
}

/**
 * Write the bundle directly to a user-chosen directory (Chrome/Edge).
 * Uses the File System Access API — same approach as PCM-Forge.
 */
async function writeBundleToDirectory(bundle, dirHandle) {
  async function ensureDir(parent, name) {
    return await parent.getDirectoryHandle(name, { create: true });
  }
  async function getNestedDir(root, relPath) {
    const parts = relPath.split("/").filter(Boolean);
    let h = root;
    for (const p of parts) h = await ensureDir(h, p);
    return h;
  }

  for (const f of bundle.files) {
    const parts = f.path.split("/");
    const fname = parts.pop();
    const parentRel = parts.join("/");
    const parentH = parentRel ? await getNestedDir(dirHandle, parentRel) : dirHandle;
    const fileH = await parentH.getFileHandle(fname, { create: true });
    const writable = await fileH.createWritable();
    await writable.write(f.bytes);
    await writable.close();
  }
}

/**
 * Package the bundle as a ZIP file and trigger a download.
 */
async function downloadBundleAsZip(bundle, filename) {
  const zip = new JSZip();
  for (const f of bundle.files) {
    if (f.path.endsWith("/.keep")) continue; // directories get created automatically when child files added; .keep not needed
    zip.file(f.path, f.bytes);
  }
  const blob = await zip.generateAsync({ type: "blob", compression: "DEFLATE", compressionOptions: { level: 6 } });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}
